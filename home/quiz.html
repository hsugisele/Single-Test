<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>英文單字聽力小考工具 Pro (v3)</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif, 'Microsoft JhengHei';
            background-color: #f4f7f6;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px 0;
        }
        .container {
            background-color: #fff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 90%;
            max-width: 600px;
            text-align: center;
        }
        h1 { color: #2c3e50; margin-bottom: 20px; }
        
        .settings-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
            text-align: left;
        }
        .settings-item label {
            display: block;
            font-size: 14px;
            font-weight: bold;
            margin-bottom: 5px;
        }
        .settings-item input {
            width: 100%;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
            box-sizing: border-box;
        }

        /* 語速按鈕樣式 */
        .rate-group {
            text-align: left;
            margin-bottom: 20px;
        }
        .btn-rate {
            background-color: #ecf0f1;
            color: #7f8c8d;
            border: 2px solid #bdc3c7;
            padding: 5px 15px;
            cursor: pointer;
            border-radius: 20px;
            margin-right: 5px;
            transition: 0.3s;
        }
        .btn-rate.active {
            background-color: #3498db;
            color: white;
            border-color: #2980b9;
        }

        .import-area {
            text-align: left;
            margin-bottom: 10px;
        }
        
        textarea {
            width: 100%;
            min-height: 120px;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 16px;
            box-sizing: border-box;
            resize: none;
            overflow: hidden;
            margin-bottom: 20px;
            line-height: 1.5;
            transition: height 0.2s ease;
        }

        .btn {
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.3s;
            margin: 5px;
        }
        .btn-primary { background-color: #3498db; color: white; }
        .btn-primary:hover { background-color: #2980b9; }
        .btn-secondary { background-color: #95a5a6; color: white; }
        .btn-secondary:hover { background-color: #7f8c8d; }
        .btn-success { background-color: #2ecc71; color: white; }
        .btn-success:hover { background-color: #27ae60; }
        .btn-warning { background-color: #f1c40f; color: white; }
        .btn-warning:hover { background-color: #f39c12; }
        .btn-import { background-color: #f39c12; color: white; margin-bottom: 10px; }

        .status-text { font-size: 28px; font-weight: bold; color: #e74c3c; margin: 30px 0 10px; }
        .timer-text { font-size: 20px; color: #7f8c8d; margin-bottom: 30px; height: 24px; }
        
        #result-section ul { list-style-type: none; padding: 0; text-align: left; }
        #result-section li {
            background: #f8f9fa;
            margin: 5px 0;
            padding: 10px;
            border-radius: 4px;
            border-left: 5px solid #3498db;
        }

        #file-input { display: none; }
    </style>
</head>
<body>

<div class="container">
    <div id="setup-section">
        <h1>單字小考設定</h1>
        
        <div class="settings-grid">
            <div class="settings-item">
                <label>朗讀次數 (次)</label>
                <input type="number" id="speech-count" value="2" min="1">
            </div>
            <div class="settings-item">
                <label>下一題間隔秒數 (秒)</label>
                <input type="number" id="wait-seconds" value="30" min="1">
            </div>
        </div>

        <div class="rate-group">
            <label style="font-size: 14px; font-weight: bold; display: block; margin-bottom: 5px;">語音速度</label>
            <button class="btn-rate" onclick="setRate(1.0)">1.0X</button>
            <button class="btn-rate active" onclick="setRate(0.85)">0.85X</button>
            <button class="btn-rate" onclick="setRate(0.65)">0.65X</button>
        </div>

        <div class="import-area">
            <button class="btn btn-import" onclick="document.getElementById('file-input').click()">📁 匯入文件 (.txt)</button>
            <input type="file" id="file-input" accept=".txt">
            <span style="font-size: 12px; color: #888;">格式：英文,中文 (每行一個)</span>
        </div>

        <textarea id="word-input" placeholder="在此輸入單字...&#10;apple,蘋果&#10;turn... into...,變成&#10;mean / meant,意思" oninput="autoResize(this)"></textarea>
        <br>
        <button class="btn btn-primary" style="width: 100%; padding: 15px;" onclick="initQuiz()">確認並開始測驗</button>
    </div>

    <div id="quiz-section" style="display:none;">
        <h1>聽力測驗(請開聲音)</h1>
        <div id="status" class="status-text">準備開始...</div>
        <div id="timer" class="timer-text"></div>
        
        <button id="pause-btn" class="btn btn-warning" onclick="togglePause()">⏸ 暫停</button>

        <div style="margin-top: 50px; border-top: 1px solid #eee; padding-top: 20px;">
            <button class="btn btn-secondary" onclick="stopAndBack()">← 回上一頁</button>
            <button class="btn btn-success" onclick="restartQuiz()">↻ 重新測驗</button>
            <button id="show-answer-btn" class="btn btn-primary" style="display:none;" onclick="showAnswers()">查看解答</button>
        </div>
    </div>

    <div id="result-section" style="display:none;">
        <h1>測驗解答</h1>
        <ul id="answer-list"></ul>
        <button class="btn btn-primary" onclick="backToHome()">回首頁</button>
    </div>
</div>

<script>
    let rawWordList = [];
    let currentQuizList = [];
    let currentIndex = 0;
    let countdownInterval;
    let isStopped = false;
    
    // 新增狀態變數
    let currentRate = 0.85;
    let isPaused = false;
    let currentSpeakTimes = 0;
    let currentWaitSeconds = 0;
    let quizPhase = 'speaking'; // 'speaking' 或 'counting'

    // --- 語速設定 ---
    function setRate(rate) {
        currentRate = rate;
        const btns = document.querySelectorAll('.btn-rate');
        btns.forEach(btn => {
            if(parseFloat(btn.innerText) === rate) {
                btn.classList.add('active');
            } else {
                btn.classList.remove('active');
            }
        });
    }

    // --- 暫停/播放切換 ---
    function togglePause() {
        if (isPaused) {
            // 繼續
            isPaused = false;
            document.getElementById('pause-btn').innerText = '⏸ 暫停';
            document.getElementById('pause-btn').classList.replace('btn-primary', 'btn-warning');
            
            if (quizPhase === 'speaking') {
                playWordCycle(); // 重新開始當前的朗讀循環
            } else {
                startTimer(currentWaitSeconds); // 繼續剩餘的倒數
            }
        } else {
            // 暫停
            isPaused = true;
            document.getElementById('pause-btn').innerText = '▶ 繼續';
            document.getElementById('pause-btn').classList.replace('btn-warning', 'btn-primary');
            
            window.speechSynthesis.cancel(); // 停止語音
            clearInterval(countdownInterval); // 停止計時
            document.getElementById('timer').innerText = '(已暫停)';
        }
    }

    function autoResize(textarea) {
        textarea.style.height = 'auto';
        textarea.style.height = textarea.scrollHeight + 'px';
    }

    document.getElementById('file-input').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(e) {
            const textarea = document.getElementById('word-input');
            textarea.value = e.target.result;
            autoResize(textarea);
        };
        reader.readAsText(file);
    });

    function initQuiz() {
        const input = document.getElementById('word-input').value;
        const lines = input.split('\n');
        rawWordList = [];
        for (let line of lines) {
            if (line.trim() !== '') {
                let parts = line.split(/[,，]/); 
                let engWord = parts[0].trim();
                let chtWord = parts.length > 1 ? parts[1].trim() : "（未提供中文）";
                if (engWord) rawWordList.push({ eng: engWord, cht: chtWord });
            }
        }
        if (rawWordList.length === 0) {
            alert('請輸入或匯入單字！');
            return;
        }
        startNewQuizSession();
    }

    function startNewQuizSession() {
        isStopped = false;
        isPaused = false;
        document.getElementById('pause-btn').innerText = '⏸ 暫停';
        document.getElementById('pause-btn').style.display = 'inline-block';

        currentQuizList = [...rawWordList];
        for (let i = currentQuizList.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [currentQuizList[i], currentQuizList[j]] = [currentQuizList[j], currentQuizList[i]];
        }
        currentIndex = 0;
        document.getElementById('setup-section').style.display = 'none';
        document.getElementById('quiz-section').style.display = 'block';
        document.getElementById('result-section').style.display = 'none';
        document.getElementById('show-answer-btn').style.display = 'none';
        
        prepareNextWord();
    }

    function prepareNextWord() {
        if (currentIndex >= currentQuizList.length) {
            document.getElementById('status').innerText = '測驗完畢！';
            document.getElementById('timer').innerText = '';
            document.getElementById('show-answer-btn').style.display = 'inline-block';
            document.getElementById('pause-btn').style.display = 'none';
            return;
        }
        currentSpeakTimes = 0;
        playWordCycle();
    }

    function playWordCycle() {
        if (isStopped || isPaused) return;
        
        quizPhase = 'speaking';
        const speechCount = parseInt(document.getElementById('speech-count').value) || 2;
        const waitSeconds = parseInt(document.getElementById('wait-seconds').value) || 30;
        const word = currentQuizList[currentIndex];
        
        document.getElementById('status').innerText = `第 ${currentIndex + 1} 題 / 共 ${currentQuizList.length} 題`;
        document.getElementById('timer').innerText = `朗讀中 (第 ${currentSpeakTimes + 1} 次)...`;
        
        speakWord(word.eng, () => {
            if (isPaused) return;
            currentSpeakTimes++;
            if (currentSpeakTimes < speechCount) {
                setTimeout(playWordCycle, 1500); 
            } else {
                currentWaitSeconds = waitSeconds;
                startTimer(currentWaitSeconds);
            }
        });
    }

    function speakWord(text, callback) {
        window.speechSynthesis.cancel(); 
        let textToSpeak = text;
        textToSpeak = textToSpeak.replace(/\//g, ', ');
        textToSpeak = textToSpeak.replace(/\.\.\./g, ', ');
        textToSpeak = textToSpeak.replace(/／/g, ', ');
        textToSpeak = textToSpeak.replace(/…/g, ', ');

        const msg = new SpeechSynthesisUtterance(textToSpeak);
        msg.lang = 'en-US';
        msg.rate = currentRate; // 使用設定的語速
        msg.onend = callback;
        window.speechSynthesis.speak(msg);
    }

    function startTimer(seconds) {
        if (isStopped || isPaused) return;
        
        quizPhase = 'counting';
        currentWaitSeconds = seconds;
        document.getElementById('timer').innerText = `等待下一題：${currentWaitSeconds} 秒`;
        
        clearInterval(countdownInterval);
        countdownInterval = setInterval(() => {
            if (isStopped || isPaused) {
                clearInterval(countdownInterval);
                return;
            }
            currentWaitSeconds--;
            document.getElementById('timer').innerText = `等待下一題：${currentWaitSeconds} 秒`;
            
            if (currentWaitSeconds <= 0) {
                clearInterval(countdownInterval);
                currentIndex++;
                prepareNextWord();
            }
        }, 1000);
    }

    function stopAndBack() {
        isStopped = true;
        window.speechSynthesis.cancel();
        clearInterval(countdownInterval);
        document.getElementById('quiz-section').style.display = 'none';
        document.getElementById('setup-section').style.display = 'block';
    }

    function restartQuiz() {
        isStopped = true;
        window.speechSynthesis.cancel();
        clearInterval(countdownInterval);
        startNewQuizSession();
    }

    function showAnswers() {
        document.getElementById('quiz-section').style.display = 'none';
        document.getElementById('result-section').style.display = 'block';
        const list = document.getElementById('answer-list');
        list.innerHTML = '';
        currentQuizList.forEach((w, i) => {
            const li = document.createElement('li');
            li.innerHTML = `<strong>${i + 1}. ${w.eng}</strong> - ${w.cht}`;
            list.appendChild(li);
        });
    }

    function backToHome() {
        document.getElementById('result-section').style.display = 'none';
        document.getElementById('setup-section').style.display = 'block';
        autoResize(document.getElementById('word-input'));
    }
</script>

</body>
</html>
